<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Racer: Global Telemetry 🏎️</title>
    
    <!-- FIXED SCRIPTS -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <script src="https://jsdelivr.net"></script>
    <link href="https://googleapis.com" rel="stylesheet">
    
    <style>
        :root { --accent: #00f2ff; --danger: #ff0055; --glass: rgba(10, 10, 12, 0.95); --border: rgba(255, 255, 255, 0.1); }
        body { font-family: 'Inter', sans-serif; background: #000; color: #fff; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%); }
        .bg-line { position: absolute; width: 2px; height: 100px; background: linear-gradient(to bottom, transparent, var(--accent), transparent); opacity: 0.2; animation: moveLine 4s linear infinite; }
        @keyframes moveLine { from { top: -100px; } to { top: 110vh; } }
        .app-container { width: 90%; max-width: 440px; background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 4px; padding: 40px; position: relative; box-shadow: 0 40px 100px rgba(0,0,0,0.8); z-index: 10; text-align: center; }
        h1 { font-family: 'Syncopate', sans-serif; font-size: 0.9rem; letter-spacing: 3px; color: var(--accent); text-transform: uppercase; margin-bottom: 30px; }
        input { width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--border); padding: 10px 0; color: #fff; font-size: 1rem; font-family: 'Syncopate', sans-serif; outline: none; margin-bottom: 20px; }
        .racer-btn { background: rgba(255,255,255,0.03); border: 1px solid var(--border); color: #ccc; padding: 18px; cursor: pointer; width: 100%; font-weight: bold; text-transform: uppercase; transition: 0.2s; margin: 10px 0; }
        .racer-btn:hover { border-color: var(--accent); color: #fff; }
        .btn-correct { background: rgba(0, 242, 255, 0.2) !important; border-color: var(--accent) !important; }
        .btn-wrong { background: rgba(255, 0, 85, 0.2) !important; border-color: var(--danger) !important; }
        .hidden { display: none !important; }
        .entry { display: flex; justify-content: space-between; border-bottom: 1px solid #222; padding: 8px 0; font-size: 0.8rem; text-align: left; }
    </style>
</head>
<body>
    <div class="app-container" id="app">
        <h1>INITIALIZING...</h1>
    </div>

    <script>
        // FIXED CONFIG: All URLs restored
        const firebaseConfig = {
            apiKey: "AIzaSyA6XwPIyCsapTe0kjdSvAepZ3ev1dK-DoI",
            authDomain: "bestie-quiz-a2daf.firebaseapp.com",
            databaseURL: "https://bestie-quiz-a2daf-default-rtdb.firebaseio.com",
            projectId: "bestie-quiz-a2daf",
            storageBucket: "bestie-quiz-a2daf.firebasestorage.app",
            messagingSenderId: "1033751201605",
            appId: "1:1033751201605:web:60d25d24bdcd1d40c0a02c",
            measurementId: "G-2YDL8220M9"
        };

        try {
            firebase.initializeApp(firebaseConfig);
            var db = firebase.database();
        } catch (e) {
            console.error(e);
            document.getElementById('app').innerHTML = "<h1>SYSTEM ERROR</h1>";
        }

        const CONFIG = {
            questions: [
                { q: "Favorite food? 🍕", a: ["Pizza", "Burgers", "Sushi", "Shawarma"], c: 3 },
                { q: "Dream travel? ✈️", a: ["Beach", "Mountains", "City", "Race Track"], c: 1 },
                { q: "Secret talent? 🎭", a: ["Sleeping", "Singing", "Gaming", "Debts 😹"], c: 0 },
                { q: "Fav song? 🎶", a: ["She Goes By", "Rock Baby", "Blue", "Other"], c: 0 },
                { q: "Am I a morning person? ☀️", a: ["Yes", "No"], c: 1 },
                { q: "Cats or Dogs? 🐾", a: ["Cats", "Dogs"], c: 1 },
                { q: "Coke or Pepsi? 🥤", a: ["Coke", "Pepsi"], c: 0 },
                { q: "Favorite season? 🍂", a: ["Summer", "Winter"], c: 0 },
                { q: "Where would I travel? 🌍", a: ["Tokyo", "Switzerland"], c: 0 },
                { q: "Introvert or Extrovert? 👥", a: ["Introvert", "Extrovert"], c: 0 },
                { q: "Android or iPhone? 📱", a: ["iPhone", "Android"], c: 1 },
                { q: "Movie genre? 🍿", a: ["Horror", "Comedy"], c: 1 },
                { q: "My biggest fear? 😱", a: ["None", "Heights"], c: 0 },
                { q: "Best superpower? ⚡", a: ["Flight", "Invisibility"], c: 0 },
                { q: "TYPE?? 😍", a: ["Short and cute", "Tall and savory"], c: 0 },
                { q: "Tea or Coffee? ☕", a: ["Coffee", "Tea"], c: 0 },
                { q: "Do I like dancing? 💃", a: ["Yes", "No"], c: 1 },
                { q: "Rainy days or Sunny days? 🌧️", a: ["Rainy", "Sunny"], c: 0 },
                { q: "My birth month? 🎂", a: ["Jan-Jun", "Jul-Dec"], c: 0 },
                { q: "FAV CAR 🚗", a: ["Audi", "BMW"], c: 1 }
            ]
        };

        const STATE = { playerName: "", currentIdx: 0, score: 0, isProcessing: false };
        const app = document.getElementById('app');

        function init() {
            if (localStorage.getItem("quiz_locked")) {
                showFinalLeaderboard();
            } else {
                renderNameScreen();
            }
        }

        function renderNameScreen() {
            app.innerHTML = `<h1>Do u know me?? 🤔</h1><input type="text" id="p-name" placeholder="ENTER NAME..."><button class="racer-btn" onclick="start()">START 🚀</button>`;
        }

        function start() {
            const n = document.getElementById('p-name').value;
            if(!n.trim()) return;
            STATE.playerName = n.toUpperCase();
            renderQuestion();
        }

        function renderQuestion() {
            const data = CONFIG.questions[STATE.currentIdx];
            let btns = data.a.map((opt, i) => `<button class="racer-btn" onclick="hit(this, ${i})">${opt}</button>`).join('');
            app.innerHTML = `<h1>SYSTEM ${STATE.currentIdx + 1}/20</h1><p>${data.q}</p><div class="btn-grid">${btns}</div>`;
        }

        function hit(btn, idx) {
            if(STATE.isProcessing) return; STATE.isProcessing = true;
            const correct = CONFIG.questions[STATE.currentIdx].c;
            if(idx === correct) { STATE.score++; btn.classList.add('btn-correct'); } else { btn.classList.add('btn-wrong'); }
            setTimeout(() => {
                STATE.currentIdx++;
                if(STATE.currentIdx < 20) renderQuestion();
                else finalize();
                STATE.isProcessing = false;
            }, 600);
        }

        function finalize() {
            localStorage.setItem("quiz_locked", "true");
            db.ref('scores').push({ name: STATE.playerName, score: STATE.score });
            showFinalLeaderboard();
        }

        function showFinalLeaderboard() {
            app.innerHTML = `<h1>TELEMETRY REPORT</h1><div id="global-lb">Loading Standings...</div>`;
            db.ref('scores').orderByChild('score').limitToLast(10).on('value', (snap) => {
                let list = [];
                snap.forEach(c => { list.push(c.val()); });
                list.reverse();
                document.getElementById('global-lb').innerHTML = `<h3>GLOBAL TOP 10</h3>` + 
                list.map((e, i) => `<div class="entry"><span>${i + 1}. ${e.name}</span><span>${e.score} PTS</span></div>`).join('');
            });
            if(STATE.score >= 15) confetti();
        }

        init();
    </script>
</body>
</html>
