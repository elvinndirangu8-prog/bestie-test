<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bestie Test: Leaderboard Edition 🏎️</title>
    <script src="https://jsdelivr.net"></script>
    <style>
        body { 
            font-family: 'Poppins', sans-serif; 
            background: radial-gradient(circle, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0.9) 100%), 
                        url('https://unsplash.com');
            background-size: cover; background-position: center; background-attachment: fixed;
            display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; color: #fff; overflow-x: hidden;
        }

        .quiz-container { 
            background: rgba(15, 15, 15, 0.95); padding: 30px; border-radius: 20px; 
            box-shadow: 0 0 30px rgba(35, 166, 213, 0.5); width: 90%; max-width: 400px; text-align: center; border: 1px solid #444;
        }

        input {
            width: 80%; padding: 12px; margin: 15px 0; border-radius: 8px; border: none; font-size: 1em; text-align: center;
        }

        .leaderboard {
            margin-top: 20px; background: rgba(255,255,255,0.1); padding: 15px; border-radius: 10px; text-align: left;
        }

        .leaderboard-entry {
            display: flex; justify-content: space-between; border-bottom: 1px solid #444; padding: 5px 0;
        }

        .circle-wrap {
            margin: 20px auto; width: 120px; height: 120px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; border: 8px solid #23a6d5;
        }

        button { 
            background: #23a6d5; color: white; border: none; padding: 14px; border-radius: 10px; 
            cursor: pointer; width: 100%; font-weight: bold; text-transform: uppercase; margin-top: 10px;
        }

        .hidden { display: none !important; }
        .bg-emoji { position: absolute; animation: float 10s linear infinite; opacity: 0.5; z-index: -1; }
        @keyframes float { 0% { transform: translateY(110vh); } 100% { transform: translateY(-10vh); } }
    </style>
</head>
<body>

<div class="quiz-container">
    <!-- NAME INPUT SCREEN -->
    <div id="name-screen">
        <h1>ENTRY FORM 📝</h1>
        <p>Enter your racer name to start:</p>
        <input type="text" id="player-name" placeholder="Your Name..." maxlength="15">
        <button onclick="saveName()">Start Engine 🚀</button>
    </div>

    <!-- QUIZ BOX (Keep your 20 questions here) -->
    <div id="quiz-box" class="hidden">
        <div class="question active" data-answer="D"><p>1. Favorite food? 🍕</p>
            <button onclick="checkAnswer(this, 'A')">Pizza</button>
            <button onclick="checkAnswer(this, 'B')">Burgers</button>
            <button onclick="checkAnswer(this, 'C')">Sushi</button>
            <button onclick="checkAnswer(this, 'D')">Shawarma</button>
        </div>
        <!-- ... Add your other 19 questions here ... -->
    </div>

    <!-- RESULT & LEADERBOARD -->
    <div id="result-screen" class="hidden">
        <h2>FINAL RANK 🏁</h2>
        <div class="circle-wrap"><span id="score-val" style="font-size: 2em;">0</span></div>
        
        <div class="leaderboard">
            <h3 style="text-align: center; margin-top: 0;">🏆 LEADERBOARD</h3>
            <div id="leaderboard-list"></div>
        </div>
        <p style="font-size: 0.7em; margin-top: 15px; color: #888;">Data saved locally on this device.</p>
    </div>
</div>

<script>
    let playerName = "";
    let score = 0;
    let currentStep = 0;
    const qs = document.querySelectorAll('.question');

    function saveName() {
        const input = document.getElementById('player-name').value;
        if (input.trim() === "") return alert("Enter a name, racer!");
        playerName = input;
        document.getElementById('name-screen').classList.add('hidden');
        document.getElementById('quiz-box').classList.remove('hidden');
    }

    function checkAnswer(btn, choice) {
        const correct = qs[currentStep].getAttribute('data-answer');
        if (choice === correct) {
            score++;
            btn.style.background = "#2ecc71";
        } else {
            btn.style.background = "#ff4757";
        }

        setTimeout(() => {
            qs[currentStep].classList.replace('active', 'hidden');
            currentStep++;
            if (currentStep < qs.length) {
                qs[currentStep].classList.replace('hidden', 'active');
            } else { showResults(); }
        }, 600);
    }

    function showResults() {
        document.getElementById('quiz-box').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('score-val').innerText = score + "/20";

        // SAVE SCORE TO LOCAL STORAGE
        let history = JSON.parse(localStorage.getItem('bestie_scores')) || [];
        history.push({name: playerName, points: score});
        history.sort((a, b) => b.points - a.points); // Sort highest first
        localStorage.setItem('bestie_scores', JSON.stringify(history.slice(0, 5))); // Keep top 5

        // DISPLAY LEADERBOARD
        const list = document.getElementById('leaderboard-list');
        history.slice(0, 5).forEach((entry, index) => {
            list.innerHTML += `<div class="leaderboard-entry">
                <span>${index + 1}. ${entry.name}</span>
                <span>${entry.points}/20</span>
            </div>`;
        });

        if (score >= 15) confetti({ particleCount: 150, spread: 70 });
    }

    // Floating Emojis
    setInterval(() => {
        const e = document.createElement('div');
        e.className = 'bg-emoji';
        e.innerText = ['🏎️', '🏁', '🔥', '😊'][Math.floor(Math.random()*4)];
        e.style.left = Math.random() * 100 + "vw";
        document.body.appendChild(e);
        setTimeout(() => e.remove(), 10000);
    }, 1000);
</script>
</body>
</html>
