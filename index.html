<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Do u know me?? 🤔🏎️</title>
    <script src="https://jsdelivr.net"></script>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --accent: #00f2ff; --danger: #ff0055; --glass: rgba(10, 10, 12, 0.95); --border: rgba(255, 255, 255, 0.1); }
        body { font-family: 'Inter', sans-serif; background: #000; color: #fff; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%); }
        .bg-line { position: absolute; width: 2px; height: 100px; background: linear-gradient(to bottom, transparent, var(--accent), transparent); opacity: 0.2; animation: moveLine 4s linear infinite; }
        @keyframes moveLine { from { top: -100px; } to { top: 110vh; } }
        .app-container { width: 90%; max-width: 440px; background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 4px; padding: 40px; position: relative; box-shadow: 0 40px 100px rgba(0,0,0,0.8); z-index: 10; }
        h1 { font-family: 'Syncopate', sans-serif; font-size: 0.9rem; letter-spacing: 3px; color: var(--accent); text-transform: uppercase; margin-bottom: 30px; }
        input { width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--border); padding: 10px 0; color: #fff; font-size: 1rem; font-family: 'Syncopate', sans-serif; outline: none; transition: 0.3s; margin-bottom: 20px; }
        input:focus { border-color: var(--accent); }
        .btn-grid { display: grid; gap: 12px; margin-top: 20px; }
        .racer-btn { background: rgba(255,255,255,0.03); border: 1px solid var(--border); color: #ccc; padding: 18px; cursor: pointer; text-align: left; font-size: 0.85rem; text-transform: uppercase; transition: all 0.2s; position: relative; }
        .racer-btn:hover { background: rgba(255,255,255,0.08); color: #fff; border-color: var(--accent); }
        .btn-correct { background: rgba(0, 242, 255, 0.2) !important; border-color: var(--accent) !important; }
        .btn-wrong { background: rgba(255, 0, 85, 0.2) !important; border-color: var(--danger) !important; }
        .gauge { width: 150px; height: 150px; border-radius: 50%; margin: 0 auto 20px; border: 4px solid var(--accent); display: flex; align-items: center; justify-content: center; box-shadow: 0 0 20px rgba(0, 242, 255, 0.2); }
        .fade-in { animation: fadeIn 0.4s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="app-container" id="app"></div>

    <script>
        const CONFIG = {
            questions: [
                { q: "Favorite food? 🍕", a: ["Pizza", "Burgers", "Sushi", "Shawarma"], c: 3 },
                { q: "Dream travel? ✈️", a: ["Beach", "Mountains", "City", "Race Track"], c: 1 },
                { q: "Secret talent? 🎭", a: ["Sleeping", "Singing", "Gaming", "Debts 😹"], c: 0 },
                { q: "Fav song? 🎶", a: ["She Goes By", "Rock Baby", "Blue", "Other"], c: 0 },
                { q: "Am I a morning person? ☀️", a: ["Yes", "No"], c: 1 },
                { q: "Cats or Dogs? 🐾", a: ["Cats", "Dogs"], c: 1 },
                { q: "Coke or Pepsi? 🥤", a: ["Coke", "Pepsi"], c: 0 },
                { q: "Favorite season? 🍂", a: ["Summer", "Winter"], c: 0 },
                { q: "Where would I travel? 🌍", a: ["Tokyo", "Switzerland"], c: 0 },
                { q: "Introvert or Extrovert? 👥", a: ["Introvert", "Extrovert"], c: 0 },
                { q: "Android or iPhone? 📱", a: ["iPhone", "Android"], c: 1 },
                { q: "Movie genre? 🍿", a: ["Horror", "Comedy"], c: 1 },
                { q: "My biggest fear? 😱", a: ["None", "Heights"], c: 0 },
                { q: "Best superpower? ⚡", a: ["Flight", "Invisibility"], c: 0 },
                { q: "TYPE?? 😍", a: ["Short and cute", "Tall and savory"], c: 0 },
                { q: "Tea or Coffee? ☕", a: ["Coffee", "Tea"], c: 0 },
                { q: "Do I like dancing? 💃", a: ["Yes", "No"], c: 1 },
                { q: "Rainy days or Sunny days? 🌧️", a: ["Rainy", "Sunny"], c: 0 },
                { q: "My birth month? 🎂", a: ["Jan-Jun", "Jul-Dec"], c: 0 },
                { q: "FAV CAR 🚗", a: ["Audi", "BMW"], c: 1 }
            ]
        };

        const STATE = { playerName: "", currentIdx: 0, score: 0, isProcessing: false };

        const VIEW = {
            app: document.getElementById('app'),
            init() { this.renderNameScreen(); this.createLines(); },
            createLines() { for(let i=0; i<12; i++) { let l = document.createElement('div'); l.className = 'bg-line'; l.style.left = Math.random() * 100 + "vw"; l.style.animationDelay = Math.random() * 4 + "s"; document.body.appendChild(l); } },
            renderNameScreen() {
                this.app.innerHTML = `<div class="fade-in"><h1>Do u know me?? 🤔</h1><p style="font-size:0.8rem; color:#888;">INITIALIZING SYSTEM...</p><input type="text" id="p-name" placeholder="ENTER RACER NAME..." autocomplete="off"><button class="racer-btn" onclick="CONTROLLER.start()">START ENGINE 🚀</button></div>`;
            },
            renderQuestion() {
                const data = CONFIG.questions[STATE.currentIdx];
                let btns = data.a.map((opt, i) => `<button class="racer-btn" onclick="CONTROLLER.hit(this, ${i})">${opt}</button>`).join('');
                this.app.innerHTML = `<div class="fade-in"><h1>TELEMETRY ${STATE.currentIdx + 1}/20</h1><p style="margin:20px 0;">${data.q}</p><div class="btn-grid">${btns}</div></div>`;
            },
            renderResults() {
                this.app.innerHTML = `<div class="fade-in"><h1>SYSTEM REPORT</h1><div class="gauge"><span style="font-size:2rem; font-family:'Syncopate';">${STATE.score}</span></div><p>SCORE CAPTURED</p><div id="lb" style="margin-top:20px; text-align:left;"></div></div>`;
                this.handleLB();
            },
            handleLB() {
                let lb = JSON.parse(localStorage.getItem('racer_scores') || '[]');
                lb.push({ n: STATE.playerName, s: STATE.score });
                lb.sort((a,b) => b.s - a.s);
                localStorage.setItem('racer_scores', JSON.stringify(lb.slice(0,5)));
                document.getElementById('lb').innerHTML = `<p style="color:var(--accent); font-size:0.7rem;">LEADERBOARD</p>` + lb.slice(0,5).map(e => `<div style="display:flex; justify-content:space-between; font-size:0.8rem; padding:5px 0; border-bottom:1px solid #222;"><span>${e.n}</span><span>${e.s} PTS</span></div>`).join('');
            }
        };

        const CONTROLLER = {
            start() { const n = document.getElementById('p-name').value; if(!n.trim()) return; STATE.playerName = n.toUpperCase(); VIEW.renderQuestion(); },
            hit(btn, idx) {
                if(STATE.isProcessing) return; STATE.isProcessing = true;
                const correct = CONFIG.questions[STATE.currentIdx].c;
                if(idx === correct) { STATE.score++; btn.classList.add('btn-correct'); } else { btn.classList.add('btn-wrong'); }
                setTimeout(() => { STATE.currentIdx++; if(STATE.currentIdx < 20) VIEW.renderQuestion(); else { VIEW.renderResults(); if(STATE.score >= 15) confetti({ particleCount: 200 }); } STATE.isProcessing = false; }, 600);
            }
        };
        VIEW.init();
    </script>
</body>
</html>
